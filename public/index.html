  <body>
    <div class="header">
      <div class="logo">
        <img src="./images/EMMlogo.png" alt="Edmond Mobile Meals Logo">
      </div>
      

    </div>

    <div class="container">
      <div class="content">
        <h2 class="uplaodtext">Upload Files</h2>
        <div class="uploadContainer">
          
           <div class="upload-group">
            <h2>Client</h2>
            <button id="clientUpload" class="upload-btn">
              <div class="inner">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p id="clientFileName"></p>
              </div>
            </button>
          </div>
          <input type="file" id="clientFile" accept=".csv,.xlsx" hidden>

          <div class="upload-group">
            <h2>Volunteer</h2>
            <button id="volunteerUpload" class="upload-btn">
              <div class="inner">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p id="volunteerFileName"></p>
              </div>
            </button>
            <input type="file" id="volunteerFile" accept=".csv,.xlsx" hidden>
          </div>


        </div>
        <button id="generateBtn" class="generateBtn" href="assignment.html">Generate</button>
        
      </div>

    </div>
